name: CI

on:
  push:
    branches: [main, master]
  pull_request:

permissions:
  contents: read

jobs:
  python:
    name: Python host tools
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked --dev

      - name: Lint Python
        run: uv run --locked ruff check .

      - name: Type check Python
        run: uv run --locked pyright

      - name: Run Python tests
        run: uv run --locked pytest --cov=mcp_server --cov=scripts --cov-report=term-missing

  firmware:
    name: Firmware build and checks
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache PlatformIO
        uses: actions/cache@v4
        with:
          path: |
            ~/.platformio/.cache
            ~/.platformio/packages
            ~/.platformio/platforms
          key: ${{ runner.os }}-platformio-${{ hashFiles('firmware/platformio.ini') }}
          restore-keys: |
            ${{ runner.os }}-platformio-

      - name: Install PlatformIO
        run: python -m pip install --upgrade platformio

      - name: Run native firmware unit tests
        run: cd firmware && pio test -e native

      - name: Build CoreS3 firmware
        run: cd firmware && pio run -e m5stack-cores3

      - name: Run high-severity firmware static checks
        run: cd firmware && pio check -e m5stack-cores3 --severity=high --fail-on-defect=high
